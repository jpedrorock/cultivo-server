name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores se houver push novo no mesmo branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + typecheck + build — todos obrigatórios, bloqueiam merge se falharem
  build:
    name: Lint, Type check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build
        env:
          # Build não precisa de DB real — db-migrate.mjs sai cedo se DATABASE_URL vazio
          DATABASE_URL: ""
          JWT_SECRET: "ci-build-only-not-secret"

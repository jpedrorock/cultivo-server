<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Sombra suave estilo iOS -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#a8d5d5" flood-opacity="0.4"/>
    </filter>
    <!-- Gradiente de fundo levemente azulado (igual ao original) -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f4f4"/>
    </radialGradient>
  </defs>

  <!-- Fundo circular com gradiente e sombra -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Sprout — duas folhas + caule, cor #22c55e -->
  <!-- Caule central -->
  <path d="M256 360 C256 320 256 295 256 270" stroke="#22c55e" stroke-width="30" stroke-linecap="round" fill="none"/>

  <!-- Folha esquerda (menor, inclinada para baixo-esquerda) -->
  <path d="M256 295
    C240 278 208 265 200 230
    C200 230 232 218 252 242
    C258 250 258 268 256 275 Z"
    fill="#22c55e"/>

  <!-- Folha direita (maior, inclinada para cima-direita) -->
  <path d="M256 278
    C272 252 318 238 332 200
    C332 200 296 190 272 218
    C262 230 256 258 256 270 Z"
    fill="#22c55e"/>
</svg>

<!doctype html>
<html lang="en" style="background-color:#10b981;">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>App Cultivo - Gerenciamento de Estufas</title>
    <meta name="description" content="Aplicativo profissional para gerenciamento de estufas de cultivo indoor com monitoramento de parâmetros, alertas automáticos e calculadoras práticas" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="App Cultivo" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Anti-flash: garantir fundo verde durante splash (antes do React montar) -->

    <!-- O ThemeProvider remove essa classe quando o tema é aplicado -->

    <!-- Google Fonts: Geist (modern, technical, premium) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body class="splash-loading">
    <div id="root" style="min-height:100vh;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

; ═══════════════════════════════════════════════════════════════════════════════
; Cultivo ESP32 Display — LVGL 9 (dashboard polido)
; ═══════════════════════════════════════════════════════════════════════════════

; Flags comuns LVGL 9.2
[lvgl_common]
build_flags =
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_USE_OS=LV_OS_NONE
    -I src/fonts

; Wokwi: ESP32-S3 + ILI9341 (mesmo chip do hardware real, display diferente)
[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    ; Wokwi nao simula o USB Serial/JTAG do S3 — forca UART0
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

; Hardware real: ESP32-S3 + JC4832W535 (AXS15231B)
[env:real]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    adafruit/Adafruit GFX Library
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

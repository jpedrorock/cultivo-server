; ═══════════════════════════════════════════════════════════════════════════════
; Cultivo ESP32 Display — LVGL 9 (dashboard polido)
; ═══════════════════════════════════════════════════════════════════════════════

; ──────────────────────────────────────────────────────────────────────────
; LVGL 9.2 — configurada via -D flags (LV_CONF_SKIP ativo)
; ──────────────────────────────────────────────────────────────────────────
; MIGRAÇÃO FUTURA: para gerar um src/lv_conf.h canônico:
;   1. Copiar .pio/libdeps/<env>/lvgl/lv_conf_template.h → src/lv_conf.h
;   2. Descomentar o #if 0 do topo e ajustar os valores abaixo
;   3. Remover -DLV_CONF_SKIP deste arquivo
;   4. Testar no env esp32dev (Wokwi) antes do env real
;
; Inventário dos overrides do projeto (mantém sincronizado com lv_conf.h):
;   LV_COLOR_DEPTH=16          → RGB565 (display ILI9341 / AXS15231B)
;   LV_USE_LOG=0               → economiza flash, sem logs internos LVGL
;   LV_FONT_MONTSERRAT_14=1    → usado em btnCfg (LV_SYMBOL_SETTINGS glyph)
;   LV_FONT_MONTSERRAT_24=1    → fallback/compatibilidade
;   LV_USE_OS=LV_OS_NONE       → cooperativo (loop() chama lv_timer_handler)
; Font custom (Manrope) carregadas via src/fonts/cultivo_fonts.h, não por macro.
; ──────────────────────────────────────────────────────────────────────────
[lvgl_common]
build_flags =
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_USE_OS=LV_OS_NONE
    ; Decoder JPEG software (tjpgd) — usado pela aba Plantas pra renderizar
    ; fotos baixadas de /api/device/plant/<id>/photo. Zero deps externas,
    ; ~50-100ms decode pra 320x240. Migrar pra esp_new_jpeg (HW S3) se
    ; latencia incomodar.
    -DLV_USE_TJPGD=1
    -I src/fonts

; Filtro de fontes compartilhado entre os envs ESP32. Inclui cultivo_ui.cpp
; (UI compartilhada com simulador SDL2) — fase 2 da refatoracao ativada.
[esp_common]
build_src_filter = +<*>

; Wokwi: ESP32-S3 + ILI9341 (mesmo chip do hardware real, display diferente)
[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = ${esp_common.build_src_filter}
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    ; Wokwi nao simula o USB Serial/JTAG do S3 — forca UART0
    ; -U antes de -D pra evitar warning "redefined" (plataforma ja define =1)
    -UARDUINO_USB_MODE
    -UARDUINO_USB_CDC_ON_BOOT
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

; Hardware real: ESP32-S3 N16R8 + JC3248W535C (AXS15231B QSPI). Modelo do
; sticker: "JC3248W535C_I_y" (Guition / Shenzhen Jingcai). Pinout + memory
; type confirmados pela board config oficial do CYD-Klipper:
; https://github.com/suchmememanyskill/CYD-Klipper/blob/master/CYD-Klipper/boards/esp32-JC3248W535C.json
; PSRAM 8MB octal a 80MHz (qio_opi); flash 16MB qio.
[env:real]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = ${esp_common.build_src_filter}
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    adafruit/Adafruit GFX Library
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ═══════════════════════════════════════════════════════════════════════════════
; Versão ANTIGA (Adafruit_GFX) — mantida como referência
; ═══════════════════════════════════════════════════════════════════════════════

; Wokwi: ESP32 + ILI9341 (classic, sem LVGL)
[env:esp32dev-classic]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main_lvgl.cpp> -<cultivo_icons.c> -<fonts/>
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=0

; Hardware real classic: ESP32-S3 + JC4832W535 (AXS15231B, sem LVGL)
[env:real-classic]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main_lvgl.cpp> -<cultivo_icons.c> -<fonts/>
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    adafruit/Adafruit GFX Library
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ═══════════════════════════════════════════════════════════════════════════════
; Versão NOVA (LVGL) — dashboard polido
; ═══════════════════════════════════════════════════════════════════════════════

; Flags comuns LVGL — LVGL 9.2 (vector graphics + multi-thread render)
[lvgl_common]
build_flags =
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_USE_OS=LV_OS_NONE
    -I src/fonts

; Wokwi LVGL: ESP32 + ILI9341 + LVGL 8
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main.cpp>
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0

; Hardware real LVGL: ESP32-S3 + JC4832W535 (AXS15231B) + LVGL 8
[env:real]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main.cpp>
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    adafruit/Adafruit GFX Library
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

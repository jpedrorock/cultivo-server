; ═══════════════════════════════════════════════════════════════════════════════
; Versão ANTIGA (Adafruit_GFX) — mantida como referência
; ═══════════════════════════════════════════════════════════════════════════════

; Wokwi: ESP32 + ILI9341 (classic, sem LVGL)
[env:esp32dev-classic]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main_lvgl.cpp>
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=0

; Hardware real classic: ESP32-S3 + JC4832W535 (AXS15231B, sem LVGL)
[env:real-classic]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main_lvgl.cpp>
lib_deps =
    moononournation/GFX Library for Arduino @ ^1.4.9
    adafruit/Adafruit GFX Library
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ═══════════════════════════════════════════════════════════════════════════════
; Versão NOVA (LVGL) — dashboard polido
; ═══════════════════════════════════════════════════════════════════════════════

; Flags comuns LVGL
[lvgl_common]
build_flags =
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_MEM_CUSTOM=0
    -DLV_MEM_SIZE="(40U*1024U)"
    -DLV_TICK_CUSTOM=1
    '-DLV_TICK_CUSTOM_INCLUDE=<Arduino.h>'
    '-DLV_TICK_CUSTOM_SYS_TIME_EXPR=(millis())'
    -DLV_USE_LOG=0
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_24=1

; Wokwi LVGL: ESP32 + ILI9341 + LVGL 8
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main.cpp>
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0

; Hardware real LVGL: ESP32-S3 + JC4832W535 (AXS15231B) + LVGL 8
[env:real]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main.cpp>
lib_deps =
    moononournation/GFX Library for Arduino @ ^1.4.9
    adafruit/Adafruit GFX Library
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

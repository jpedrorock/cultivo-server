; ═══════════════════════════════════════════════════════════════════════════════
; Versão ANTIGA (Adafruit_GFX) — mantida como referência
; ═══════════════════════════════════════════════════════════════════════════════

; Wokwi: ESP32 + ILI9341 (classic, sem LVGL)
[env:esp32dev-classic]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main_lvgl.cpp> -<cultivo_icons.c> -<fonts/>
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=0

; Hardware real classic: ESP32-S3 + JC4832W535 (AXS15231B, sem LVGL)
[env:real-classic]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main_lvgl.cpp> -<cultivo_icons.c> -<fonts/>
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    adafruit/Adafruit GFX Library
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ═══════════════════════════════════════════════════════════════════════════════
; Versão NOVA (LVGL) — dashboard polido
; ═══════════════════════════════════════════════════════════════════════════════

; Flags comuns LVGL — LVGL 9.2 (vector graphics + multi-thread render)
; Desabilita modulos pesados que nao usamos (economiza ~50KB RAM no ESP32 classico)
[lvgl_common]
build_flags =
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_USE_OS=LV_OS_NONE
    -I src/fonts
    ; Modulos pesados desabilitados (economiza ~50KB RAM)
    -DLV_USE_THORVG_INTERNAL=0
    -DLV_USE_THORVG_EXTERNAL=0
    -DLV_USE_VECTOR_GRAPHIC=0
    -DLV_USE_SVG=0
    -DLV_USE_LOTTIE=0
    -DLV_USE_RLOTTIE=0
    -DLV_USE_FFMPEG=0
    -DLV_USE_GLTF=0

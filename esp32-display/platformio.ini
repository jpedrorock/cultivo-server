; ═══════════════════════════════════════════════════════════════════════════════
; Cultivo ESP32 Display — LVGL 9 (dashboard polido)
; ═══════════════════════════════════════════════════════════════════════════════

; ──────────────────────────────────────────────────────────────────────────
; LVGL 9.2 — configurada via -D flags (LV_CONF_SKIP ativo)
; ──────────────────────────────────────────────────────────────────────────
; MIGRAÇÃO FUTURA: para gerar um src/lv_conf.h canônico:
;   1. Copiar .pio/libdeps/<env>/lvgl/lv_conf_template.h → src/lv_conf.h
;   2. Descomentar o #if 0 do topo e ajustar os valores abaixo
;   3. Remover -DLV_CONF_SKIP deste arquivo
;   4. Testar no env esp32dev (Wokwi) antes do env real
;
; Inventário dos overrides do projeto (mantém sincronizado com lv_conf.h):
;   LV_COLOR_DEPTH=16          → RGB565 (display ILI9341 / AXS15231B)
;   LV_USE_LOG=0               → economiza flash, sem logs internos LVGL
;   LV_FONT_MONTSERRAT_14=1    → usado em btnCfg (LV_SYMBOL_SETTINGS glyph)
;   LV_FONT_MONTSERRAT_24=1    → fallback/compatibilidade
;   LV_USE_OS=LV_OS_NONE       → cooperativo (loop() chama lv_timer_handler)
; Font custom (Manrope) carregadas via src/fonts/cultivo_fonts.h, não por macro.
; ──────────────────────────────────────────────────────────────────────────
[lvgl_common]
build_flags =
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_USE_OS=LV_OS_NONE
    -I src/fonts

; Wokwi: ESP32-S3 + ILI9341 (mesmo chip do hardware real, display diferente)
[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    ; Wokwi nao simula o USB Serial/JTAG do S3 — forca UART0
    ; -U antes de -D pra evitar warning "redefined" (plataforma ja define =1)
    -UARDUINO_USB_MODE
    -UARDUINO_USB_CDC_ON_BOOT
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

; Hardware real: ESP32-S3 + JC4832W535 (AXS15231B)
[env:real]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    adafruit/Adafruit GFX Library
    lvgl/lvgl @ ^9.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${lvgl_common.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DREAL_HARDWARE
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
